<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="SG Fitness Evolution logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="55%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg)" stroke="url(#accent)" stroke-width="10" />
  <g transform="translate(0, -10)">
    <text x="232" y="250" text-anchor="middle" font-size="210" font-family="Montserrat, Poppins, Arial, sans-serif" font-weight="800" fill="#ffffff">S</text>
    <text x="298" y="262" text-anchor="middle" font-size="210" font-family="Montserrat, Poppins, Arial, sans-serif" font-weight="800" fill="url(#accent)">G</text>
  </g>
  <text x="256" y="348" text-anchor="middle" font-size="30" font-family="Montserrat, Poppins, Arial, sans-serif" font-weight="700" letter-spacing="4" fill="#cbd5f5">SG FITNESS</text>
  <text x="256" y="392" text-anchor="middle" font-size="24" font-family="Montserrat, Poppins, Arial, sans-serif" font-weight="600" letter-spacing="6" fill="#94a3b8">EVOLUTION</text>
</svg>
